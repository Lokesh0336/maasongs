<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="https://i.ibb.co/zzp5yCH/svgviewer-png-output.png"
    />

    <!-- Mobile Theme -->
    <meta
      name="theme-color"
      content="#0a0f20"
    />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>AudioStation – All Your Songs</title>

    <meta
      name="description"
      content="AudioStation – Stream and explore multi-language songs with a premium modern music experience."
    />

    <meta
      name="keywords"
      content="AudioStation, music player, songs, streaming, telugu songs, hindi songs, tamil songs, web music player"
    />

    <meta
      name="author"
      content="Lokesh.R"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="AudioStation – All Your Songs"
    />

    <meta
      property="og:description"
      content="Stream and explore multi-language songs with a premium modern music player."
    />

    <meta
      property="og:image"
      content="https://media.maasongs.online/svgviewer-png-output.png"
    />

    <meta
      property="og:type"
      content="website"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="AudioStation – All Your Songs"
    />

    <meta
      name="twitter:description"
      content="Premium modern music experience with AudioStation."
    />

    <meta
      name="twitter:image"
      content="https://media.maasongs.online/svgviewer-png-output.png"
    />

    <!-- Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Loader Style -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0f20;
        font-family: "Outfit", sans-serif;
        overflow-x: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;

        background:
          radial-gradient(
            circle at top,
            rgba(30, 127, 255, 0.18),
            transparent 60%
          ),
          #0a0f20;

        display: flex;
        align-items: center;
        justify-content: center;

        z-index: 99999;

        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }

      #app-loader img {
        width: 240px;
        max-width: 78%;

        object-fit: contain;

        filter:
          drop-shadow(
            0 0 18px rgba(30, 127, 255, 0.55)
          )
          drop-shadow(
            0 0 45px rgba(126, 200, 255, 0.25)
          );

        animation:
          floatLogo 3s ease-in-out infinite;
      }

      @keyframes floatLogo {
        0% {
          transform:
            translateY(0px)
            scale(1);
        }

        50% {
          transform:
            translateY(-10px)
            scale(1.03);
        }

        100% {
          transform:
            translateY(0px)
            scale(1);
        }
      }
    </style>
  </head>

  <body>
    <!-- Premium Loader -->
    <div id="app-loader">
      <img
        src="https://media.maasongs.online/svgviewer-png-output.png"
        alt="AudioStation Logo"
      />
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Loader Remove -->
    <script>
      window.addEventListener("load", () => {
        const loader =
          document.getElementById(
            "app-loader"
          );

        if (loader) {
          loader.style.opacity = "0";
          loader.style.visibility = "hidden";

          setTimeout(() => {
            loader.remove();
          }, 500);
        }
      });
    </script>

    <!-- Main App -->
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
